<!DOCTYPE html>
<html>
  <head>
    <title>auth demo</title>
  </head>
  <body>

    {% if messages %}
    <ul>
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% if user.is_authenticated %}
      Logged in as {{ user.username }} |
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a> |
      <a href="{% url 'register' %}">Sign up</a>
    {% endif %}

    {% block content %}
    {% endblock %}

  </body>
</html>
